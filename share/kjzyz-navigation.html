/* ========== Render Card ========== */
function renderCard(p) {
  const cls = ['card'];
  if (p.isTool) cls.push('tool');
  const fallbackAttrs = `data-fallback-symbol="${p.symbol}" data-fallback-color="${p.color || '#1d1d1f'}"`;

  let symbolHtml;
  if (p.logoUrl) {
    const logoStyle = p.logoBg ? ` style="background:${p.logoBg};border-color:${p.logoBg}"` : '';
    symbolHtml = `
      <div class="card-symbol official-logo"${logoStyle}>
        <img src="${p.logoUrl}"
             alt="${p.name}"
             ${fallbackAttrs}
             referrerpolicy="no-referrer"
             onerror="replaceLogoWithFallback(this)" />
      </div>
    `;
  } else if (p.customLogo) {
    // 自定义 SVG logo（在品牌色背景上显示白色图形）
    symbolHtml = `<div class="card-symbol custom-logo" style="background:${p.color};border-color:${p.color}">${p.customLogo}</div>`;
  } else if (p.iconSlug) {
    const colorParam = (p.color || '#1d1d1f').replace('#', '');
    symbolHtml = `
      <div class="card-symbol has-img">
        <img src="https://cdn.simpleicons.org/${p.iconSlug}/${colorParam}"
             alt="${p.name}"
             ${fallbackAttrs}
             onerror="replaceLogoWithFallback(this)" />
      </div>
    `;
  } else {
    const style = p.color
      ? `style="background:${p.color};border-color:${p.color};color:white"`
      : '';
    symbolHtml = `<div class="card-symbol" data-len="${p.symbol.length}" ${style}>${p.symbol}</div>`;
  }

  return `
    <a class="${cls.join(' ')}" href="${p.affiliateUrl}" target="_blank" rel="noopener noreferrer" data-id="${p.id}" data-url="${p.affiliateUrl}" data-tool="${!!p.isTool}">
      ${symbolHtml}
      <div class="card-text">
        <h3 class="card-name">${p.name}</h3>
        <p class="card-slogan">${p.description || p.slogan}</p>
      </div>
    </a>
  `;
}

function replaceLogoWithFallback(img) {
  if (!img || img.dataset.fallbackApplied === 'true') return;
  img.dataset.fallbackApplied = 'true';

  const symbol = img.dataset.fallbackSymbol || '?';
  const color = img.dataset.fallbackColor || '#1d1d1f';
  const fallback = document.createElement('span');
  fallback.className = 'logo-fallback';
  fallback.dataset.len = String(symbol.length);
  fallback.textContent = symbol;
  fallback.style.color = color;
  img.replaceWith(fallback);
}

function ensureLogoFallbacks() {
  document.querySelectorAll('.card-symbol img').forEach(img => {
    if (!img.complete || img.naturalWidth === 0) {
      replaceLogoWithFallback(img);
    }
  });
}

/* ========== Render Groups ========== */
const groupsEl = document.getElementById('productGroups');

function renderGroups() {
  groupsEl.innerHTML = GROUPS.map(g => {
    const items = PRODUCTS.filter(p => p.scenes.includes(g.id));
    if (items.length === 0) return '';

    return `
      <div class="product-group reveal" id="${g.id}">
        <div class="group-header">
          <span class="group-icon">${g.icon}</span>
          <span class="group-title">${g.title}</span>
        </div>
        <div class="products">
          ${items.map(renderCard).join('')}
        </div>
      </div>
    `;
  }).join('');

  // 绑定卡片点击
  groupsEl.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (event) => {
      event.preventDefault();
      const isTool = card.dataset.tool === 'true';
      handleClick(card.dataset.id, card.dataset.url, isTool);
    });
  });

  // 重新触发 reveal 动画观察
  groupsEl.querySelectorAll('.reveal').forEach(el => io.observe(el));
}

/* ========== 跳转处理 ========== */
function handleClick(id, url, isTool) {
  const item = PRODUCTS.find(p => p.id === id);
  showToast(isTool ? `跳转至 ${item?.name}...` : `即将跳转至 ${item?.name}...`);

  if (window.gtag) {
    gtag('event', isTool ? 'tool_click' : 'affiliate_click', { id });
  }
  console.log('[Click]', { id, url, isTool, time: new Date().toISOString() });

  setTimeout(() => {
    const w = window.open(url, '_blank', 'noopener,noreferrer');
    if (w) w.opener = null;
  }, 400);
}

/* ========== Toast ========== */
const toast = document.getElementById('toast');
const toastText = document.getElementById('toastText');
let toastTimer;

function showToast(msg) {
  toastText.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

/* ========== Site Search ========== */
const searchInput = document.getElementById('searchInput');
const searchKbd = document.getElementById('searchKbd');

// 平台适配 ⌘K / Ctrl+K
const isMac = /Mac|iPhone|iPad/.test(navigator.platform);
if (!isMac && searchKbd) searchKbd.textContent = 'Ctrl K';

function applySearch(q) {
  const query = q.trim().toLowerCase();
  const groups = document.querySelectorAll('.product-group');

  groups.forEach(group => {
    const cards = group.querySelectorAll('.card');
    let visibleInGroup = 0;

    cards.forEach(card => {
      if (!query) {
        card.style.display = '';
        visibleInGroup++;
        return;
      }
      const name = card.querySelector('.card-name')?.textContent.toLowerCase() || '';
      const slogan = card.querySelector('.card-slogan')?.textContent.toLowerCase() || '';
      const match = name.includes(query) || slogan.includes(query);
      card.style.display = match ? '' : 'none';
      if (match) visibleInGroup++;
    });

    // 整组无匹配时隐藏整组（含标题）
    group.style.display = visibleInGroup === 0 ? 'none' : '';
  });
}

if (searchInput) {
  searchInput.addEventListener('input', e => applySearch(e.target.value));

  // Esc 清空
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      applySearch('');
      searchInput.blur();
    }
  });

  // ⌘K / Ctrl+K 聚焦
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });
}

/* ========== Nav Scroll ========== */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 8);
});

/* ========== Reveal on Scroll ========== */
const io = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      io.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
